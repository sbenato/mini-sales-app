services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
